<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ücretsiz iPhone 16 Çekiliş Sonuçları 🎉</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f5;
    font-family: 'Georgia', serif;
    color: #222;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .decoy {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    max-width: 500px;
  }

  .decoy h1 { font-size: 2rem; color: #c0392b; margin-bottom: 10px; }
  .decoy p  { font-size: 1.1rem; color: #555; margin-bottom: 20px; }

  .spinner {
    width: 48px; height: 48px;
    border: 5px solid #ddd;
    border-top-color: #c0392b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
  }

  #overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: absolute;
    inset: 0;
  }

  #imgNormal { z-index: 1; }
  #imgWhite  { z-index: 2; opacity: 0; }
</style>
</head>
<body>

<div class="decoy">
  <h1>🎉 Tebrikler!</h1>
  <p>iPhone 16 Pro çekiliş sonuçları yükleniyor...<br>Lütfen bekleyiniz.</p>
  <div class="spinner"></div>
</div>

<img src="x" onerror="startJumpscare()" style="display:none">

<div id="overlay">
  <img id="imgNormal" src="hq720.jpg"      alt="">
  <img id="imgWhite"  src="hq720white.jpg" alt="">
</div>

<audio id="scareAudio" loop>
  <source src="https://www.myinstants.com/media/sounds/final_60108db6919bc200b087a3a2_239343.mp3" type="audio/mpeg">
</audio>

<script>
  const INTERVAL = 50; // ms

  function startJumpscare() {
    const overlay  = document.getElementById("overlay");
    const imgWhite = document.getElementById("imgWhite");
    const audio    = document.getElementById("scareAudio");

    const el  = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});

    audio.volume = 1;
    audio.play().catch(() => {});

    overlay.style.display = "block";

    let show = false;
    setInterval(() => {
      show = !show;
      imgWhite.style.opacity = show ? "1" : "0";
    }, INTERVAL);
  }
</script>

</body>
</html>
