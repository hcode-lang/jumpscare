<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yükleniyor...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  .spinner-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .spinner {
    width: 64px;
    height: 64px;
    border: 6px solid #333;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .label {
    color: #aaa;
    font-family: sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
  }

  #overlay img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    inset: 0;
  }

  #imgNormal { z-index: 1; }
  #imgWhite  { z-index: 2; opacity: 0; }
</style>
</head>
<body>

<div class="spinner-wrap">
  <div class="spinner"></div>
  <div class="label">Yükleniyor</div>
</div>

<div id="overlay">
  <img id="imgNormal" src="hq720.jpg"      alt="">
  <img id="imgWhite"  src="hq720white.jpg" alt="">
</div>

<audio id="scareAudio" loop>
  <source src="https://www.myinstants.com/media/sounds/final_60108db6919bc200b087a3a2_239343.mp3" type="audio/mpeg">
</audio>

<script>
  const INTERVAL = 1;
  let triggered = false;

  document.addEventListener("click", function() {
    if (triggered) return;
    triggered = true;

    const overlay  = document.getElementById("overlay");
    const imgWhite = document.getElementById("imgWhite");
    const audio    = document.getElementById("scareAudio");

    // Fullscreen
    const el  = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (req) req.call(el).catch(() => {});

    // Ses
    audio.volume = 1;
    audio.play().catch(() => {});

    // Overlay
    overlay.style.display = "block";

    // Yanıp sönme döngüsü
    let show = false;
    setInterval(() => {
      show = !show;
      imgWhite.style.opacity = show ? "1" : "0";
    }, INTERVAL);
  });
</script>

</body>
</html>
